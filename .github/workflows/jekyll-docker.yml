    {
      title: "Palm Reading",
      image: "https://images.unsplash.com/photo-1603575448369-90b97c8e3f34",
      desc: "Detailed palm analysis for career, health and future.",
    },
    {
      title: "Janam Kundli Analysis",
      image: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c",
      desc: "Complete birth chart reading with practical remedies.",
    },
    {
      title: "Vastu Consultation",
      image: "https://images.unsplash.com/photo-1505691938895-1758d7feb511",
      desc: "Home and office vastu correction guidance.",
    },
    {
      title: "Gemstone Recommendation",
      image: "https://images.unsplash.com/photo-1610116306796-6fea9f4fae38",
      desc: "Astrologically suitable gemstone suggestions.",
    },
    {
      title: "Spiritual Remedies",
      image: "https://images.unsplash.com/photo-1506126613408-eca07ce68773",
      desc: "Effective puja and spiritual solutions for problems.",
    },
  ];

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);

    emailjs
      .sendForm(
        "YOUR_SERVICE_ID",      // 🔴 Replace
        "YOUR_TEMPLATE_ID",     // 🔴 Replace
        e.target,
        "YOUR_PUBLIC_KEY"       // 🔴 Replace
      )
      .then(() => {
        setLoading(false);
        setSuccess(true);
        e.target.reset();
      })
      .catch((error) => {
        setLoading(false);
        alert("Failed to send appointment. Check EmailJS settings.");
        console.error(error);
      });
  };

  return (
    <div className="min-h-screen bg-white text-gray-800">

      {/* Header */}
      <header className="bg-[#0f172a] text-white px-6 py-5 shadow-md">
        <div className="max-w-7xl mx-auto flex justify-between items-center">
          <h1 className="text-2xl font-bold">
            Shree Jagdamba Jyotish Kendra
          </h1>
        </div>
      </header>

      {/* Hero */}
      <section className="bg-[#0f172a] text-white py-24 text-center px-6">
        <motion.h2
          initial={{ opacity: 0, y: -20 }}
          animate={{ opacity: 1, y: 0 }}
          className="text-4xl md:text-5xl font-bold mb-6"
        >
          Trusted Vedic Astrology Consultation
        </motion.h2>

        <Button
          onClick={() =>
            document.getElementById("contact").scrollIntoView({ behavior: "smooth" })
          }
          className="bg-yellow-500 hover:bg-yellow-600 text-black px-8 py-4 rounded-2xl text-lg"
        >
          Book Appointment
        </Button>
      </section>

      {/* Services */}
      <section className="py-20 px-6 bg-gray-50">
        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-8">
          {services.map((service, index) => (
            <Card key={index} className="rounded-2xl shadow-md overflow-hidden">
              <CardContent className="p-0">
                <img
                  src={service.image}
                  alt={service.title}
                  className="w-full h-52 object-cover"
                />
                <div className="p-6">
                  <h3 className="text-xl font-semibold mb-2">
                    {service.title}
                  </h3>
                  <p className="text-gray-600 text-sm">
                    {service.desc}
                  </p>
                </div>
              </CardContent>
            </Card>
          ))}
        </div>
      </section>

      {/* Contact */}
      <section id="contact" className="py-20 px-6 bg-white">
        <div className="max-w-3xl mx-auto">
          <h2 className="text-3xl font-bold text-center mb-10">
            Book Consultation
          </h2>

          <form
            onSubmit={handleSubmit}
            className="bg-gray-100 p-8 rounded-2xl shadow-md space-y-6"
          >
            <input
              type="text"
              name="user_name"
              placeholder="Full Name"
              required
              className="w-full p-3 rounded-xl border border-gray-300"
            />

            <input
              type="tel"
              name="user_phone"
              placeholder="Phone Number"
              required
              className="w-full p-3 rounded-xl border border-gray-300"
            />

            <input
              type="email"
              name="user_email"
              placeholder="Email Address"
              required
              className="w-full p-3 rounded-xl border border-gray-300"
            />

            <textarea
              name="user_message"
              placeholder="Your Query"
              required
              rows="4"
              className="w-full p-3 rounded-xl border border-gray-300"
            />

            <Button
              type="submit"
              className="w-full bg-yellow-500 hover:bg-yellow-600 text-black py-4 rounded-2xl text-lg"
            >
              {loading ? "Submitting..." : "Send Appointment Request"}
            </Button>

            {success && (
              <p className="text-green-600 text-center font-medium">
                Appointment request sent successfully!
              </p>
            )}
          </form>
        </div>
      </section>

      {/* Footer */}
      <footer className="bg-[#0f172a] text-white text-center py-6">
        © {new Date().getFullYear()} Shree Jagdamba Jyotish Kendra
      </footer>
    </div>
  );
}
